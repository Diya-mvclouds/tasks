<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascending Groups</title>
</head>
<body>
    <h3>Enter Number: </h3>
    <input type="text" id="num">
    <button onclick="group()">Check</button>

    <p id="result"></p>

    <script>
        function group(){
            let str = document.getElementById("num").value;
            let output = "";
            let temp = str[0];

            for (let i = 1; i < str.length; i++) {
                if (parseInt(str[i]) === parseInt(str[i-1]) + 1) {
                    temp += str[i];
                } else {
                    output += temp + " ";
                    temp = str[i];
                }
            }
            output += temp; 
            document.getElementById("result").innerText = output;
        }
    </script>
</body>
</html>
