<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check remaining Days</title>
</head>
<body>
    <h2>Check Remaining Days</h2>
    <input type="date" id = "date">
    <button onclick="date()">check</button>
    <p id="result"></p>

    <script>
        function date(){
            let future = new Date(document.getElementById("date").value);
            let now = new Date();

            let diff = future - now;
            let days = Math.floor(diff/(1000*60*60*24));

            document.getElementById("result").innerText =
            days + " days remaining";
        }
    </script>
</body>
</html>
