<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Yourself</title>
</head>
<body>
    <h2>Sign Up</h2>

    <input id="name" placeholder="Enter your Name"><br><br>
    <input id="email" placeholder="Enter yor Mail Id"><br><br>
    <input id="pass" type="password" placeholder="Create Password"><br><br>
    <button onclick="register()">Register now</button>

    <script>
        function register(){
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let pass = document.getElementById("pass").value;

        if(name=="" || email=="" || pass==""){
            alert("All fields are required");
        } else{
            localStorage.setItem("email", email);
            localStorage.setItem("pass", pass);
            window.location="confirm.html";
        }
        }
    </script>

</body>
</html>
